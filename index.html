<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planificador CEUSS 2026-2028</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #1b2a4a;
      --navy-mid: #243358;
      --navy-light: #2e4070;
      --amber: #e8a020;
      --amber-light: #f5c060;
      --amber-pale: #fffbeb;
      --white: #ffffff;
      --gray-50: #f8f9fb;
      --gray-100: #f0f2f6;
      --gray-200: #dde1ea;
      --gray-400: #9aa3b5;
      --gray-600: #5a6478;
      --gray-800: #2d3548;
      --red: #e03e3e;
      --red-pale: #fff5f5;
      --green: #2f9e5a;
      --green-pale: #f0faf4;
      --blue: #2d7dd2;
      --blue-pale: #eff6ff;
      --sidebar-w: 228px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--gray-100);
      color: var(--gray-800);
      min-height: 100vh;
    }

    /* ===================== LOGIN ===================== */
    #login-screen {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 60%, #1a3560 100%);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }

    .login-wrap {
      text-align: center;
      width: 100%;
      max-width: 400px;
      padding: 24px;
    }

    .login-badge {
      display: inline-block;
      background: rgba(232,160,32,0.15);
      border: 1px solid rgba(232,160,32,0.3);
      color: var(--amber-light);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 20px;
    }

    .login-title {
      font-family: 'DM Serif Display', serif;
      font-size: 36px;
      color: white;
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .login-sub {
      font-size: 14px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 40px;
    }

    .login-box {
      background: white;
      border-radius: 20px;
      padding: 36px 32px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.35);
    }

    .login-box label {
      display: block;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-600);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    .login-box input[type="password"] {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid var(--gray-200);
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 20px;
      letter-spacing: 6px;
      text-align: center;
      outline: none;
      color: var(--navy);
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 16px;
    }

    .login-box input[type="password"]:focus {
      border-color: var(--amber);
      box-shadow: 0 0 0 3px rgba(232,160,32,0.12);
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--navy);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .login-btn:hover { background: var(--navy-mid); }
    .login-btn:active { transform: scale(0.99); }

    .login-error {
      margin-top: 12px;
      font-size: 13px;
      color: var(--red);
      display: none;
    }

    /* ===================== APP ===================== */
    #app { display: none; min-height: 100vh; }

    /* SIDEBAR */
    .sidebar {
      position: fixed; top: 0; left: 0;
      width: var(--sidebar-w);
      height: 100vh;
      background: var(--navy);
      display: flex; flex-direction: column;
      z-index: 200;
      overflow-y: auto;
    }

    .sidebar-header {
      padding: 24px 20px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .sidebar-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: white;
      letter-spacing: -0.3px;
    }

    .sidebar-role {
      margin-top: 6px;
      font-size: 11px;
      font-weight: 600;
      color: var(--amber);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .sidebar-area {
      margin-top: 3px;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
    }

    .sidebar-nav { flex: 1; padding: 10px 0; }

    .nav-section {
      padding: 14px 20px 4px;
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 9px 20px;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      font-size: 13.5px;
      border-left: 3px solid transparent;
      transition: all 0.14s;
      user-select: none;
    }

    .nav-item:hover {
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.9);
    }

    .nav-item.active {
      background: rgba(232,160,32,0.1);
      border-left-color: var(--amber);
      color: var(--amber-light);
      font-weight: 500;
    }

    .nav-icon { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }

    .sidebar-footer {
      padding: 14px 20px;
      border-top: 1px solid rgba(255,255,255,0.07);
    }

    .logout-btn {
      width: 100%;
      padding: 9px 12px;
      background: transparent;
      color: rgba(255,255,255,0.4);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12.5px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
    }

    .logout-btn:hover {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.7);
    }

    /* MAIN */
    .main { margin-left: var(--sidebar-w); min-height: 100vh; }

    .topbar {
      background: white;
      height: 58px;
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      align-items: center;
      padding: 0 32px;
      position: sticky; top: 0; z-index: 100;
      justify-content: space-between;
    }

    .topbar-title {
      font-size: 17px;
      font-weight: 600;
      color: var(--navy);
    }

    .topbar-actions { display: flex; gap: 10px; align-items: center; }

    .content { padding: 28px 32px; max-width: 1180px; }

    /* ===================== CARDS ===================== */
    .card {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    /* ===================== GRIDS ===================== */
    .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }
    .g4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }

    /* ===================== STAT CARDS ===================== */
    .stat {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: 12px;
      padding: 18px 20px;
    }

    .stat-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--gray-400);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 30px;
      font-weight: 700;
      color: var(--navy);
      line-height: 1;
    }

    /* ===================== BUTTONS ===================== */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border-radius: 9px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.14s;
      white-space: nowrap;
    }

    .btn-primary { background: var(--navy); color: white; }
    .btn-primary:hover { background: var(--navy-mid); }

    .btn-amber { background: var(--amber); color: white; }
    .btn-amber:hover { filter: brightness(0.9); }

    .btn-outline {
      background: white;
      color: var(--gray-600);
      border: 1.5px solid var(--gray-200);
    }
    .btn-outline:hover { border-color: var(--navy); color: var(--navy); }

    .btn-danger { background: var(--red-pale); color: var(--red); border: 1.5px solid #fecaca; }
    .btn-danger:hover { background: var(--red); color: white; }

    .btn-sm { padding: 5px 11px; font-size: 12px; border-radius: 7px; }

    /* ===================== TABLES ===================== */
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--gray-400);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 9px 14px;
      border-bottom: 2px solid var(--gray-100);
    }
    td {
      padding: 12px 14px;
      font-size: 13.5px;
      border-bottom: 1px solid var(--gray-100);
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--gray-50); }

    /* ===================== BADGES ===================== */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11.5px;
      font-weight: 600;
    }
    .badge-green { background: var(--green-pale); color: #1e7a42; }
    .badge-amber { background: var(--amber-pale); color: #92620f; }
    .badge-red { background: var(--red-pale); color: #b91c1c; }
    .badge-blue { background: var(--blue-pale); color: #1d4ed8; }
    .badge-gray { background: var(--gray-100); color: var(--gray-600); }

    /* ===================== FORMS ===================== */
    .fg { margin-bottom: 15px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-600);
      margin-bottom: 5px;
      letter-spacing: 0.2px;
    }

    input[type="text"],
    input[type="date"],
    input[type="number"],
    input[type="password"],
    select, textarea {
      width: 100%;
      padding: 10px 13px;
      border: 1.5px solid var(--gray-200);
      border-radius: 9px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--gray-800);
      outline: none;
      transition: border-color 0.18s;
      background: white;
      appearance: auto;
    }

    input:focus, select:focus, textarea:focus { border-color: var(--amber); }
    textarea { resize: vertical; min-height: 80px; }

    /* ===================== MODAL ===================== */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(15,25,50,0.5);
      backdrop-filter: blur(2px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 800;
    }

    .overlay.open { display: flex; }

    .modal {
      background: white;
      border-radius: 18px;
      padding: 32px;
      width: 560px;
      max-width: 95vw;
      max-height: 88vh;
      overflow-y: auto;
      box-shadow: 0 30px 80px rgba(0,0,0,0.22);
      animation: modalIn 0.2s ease;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.96) translateY(8px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 22px;
    }

    .modal-actions {
      display: flex; gap: 10px; justify-content: flex-end;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--gray-100);
    }

    /* ===================== AREA TABS ===================== */
    .area-tabs {
      display: flex;
      gap: 3px;
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: 12px;
      padding: 5px;
      margin-bottom: 20px;
      width: fit-content;
    }

    .atab {
      padding: 7px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      color: var(--gray-600);
      transition: all 0.13s;
    }

    .atab:hover { color: var(--navy); }
    .atab.active {
      background: var(--navy);
      color: white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }

    /* ===================== CALENDAR ===================== */
    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .cal-month-label {
      font-size: 17px;
      font-weight: 600;
      color: var(--navy);
      text-transform: capitalize;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }

    .cal-hdr {
      text-align: center;
      font-size: 10.5px;
      font-weight: 700;
      color: var(--gray-400);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 7px 4px;
    }

    .cal-cell {
      min-height: 88px;
      border: 1px solid var(--gray-200);
      border-radius: 8px;
      padding: 6px;
      background: white;
      cursor: pointer;
      transition: all 0.13s;
      overflow: hidden;
    }

    .cal-cell:hover { border-color: var(--amber); background: var(--amber-pale); }
    .cal-cell.empty { background: var(--gray-50); cursor: default; border-color: transparent; }
    .cal-cell.today { border-color: var(--amber); border-width: 2px; }

    .cal-num {
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-400);
      margin-bottom: 4px;
    }

    .cal-cell.today .cal-num { color: var(--amber); }

    .cal-evt {
      font-size: 9.5px;
      padding: 2px 5px;
      border-radius: 4px;
      margin-bottom: 2px;
      line-height: 1.3;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cal-evt-ceuss     { background: #fffbeb; color: #92620f; }
    .cal-evt-cultural  { background: #eff6ff; color: #1d4ed8; }
    .cal-evt-diseno    { background: #f0faf4; color: #1e7a42; }
    .cal-evt-ediciones { background: #fff1f2; color: #b91c1c; }

    /* ===================== PROGRESS ===================== */
    .pbar {
      width: 100%;
      height: 7px;
      background: var(--gray-200);
      border-radius: 4px;
      overflow: hidden;
    }

    .pbar-fill {
      height: 100%;
      border-radius: 4px;
      background: var(--amber);
      transition: width 0.4s ease;
    }

    .pbar-fill.green { background: var(--green); }
    .pbar-fill.red { background: var(--red); }

    /* ===================== WORKLOAD ROW ===================== */
    .wrow {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 11px 0;
      border-bottom: 1px solid var(--gray-100);
    }

    .wrow:last-child { border-bottom: none; }

    .wrow-name {
      width: 130px;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--navy);
      flex-shrink: 0;
    }

    .wrow-bar { flex: 1; }
    .wrow-count { width: 52px; text-align: right; font-size: 12px; color: var(--gray-400); }

    /* ===================== KPI CARD ===================== */
    .kpi-card {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: 13px;
      padding: 20px;
    }

    .kpi-label {
      font-size: 13px;
      color: var(--gray-600);
      font-weight: 500;
      margin-bottom: 4px;
    }

    .kpi-sub {
      font-size: 11px;
      color: var(--gray-400);
      margin-bottom: 12px;
    }

    .kpi-nums {
      display: flex;
      align-items: baseline;
      gap: 5px;
      margin-bottom: 10px;
    }

    .kpi-val { font-size: 28px; font-weight: 700; color: var(--navy); }
    .kpi-meta { font-size: 13px; color: var(--gray-400); }

    /* ===================== TOAST ===================== */
    #toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: var(--navy);
      color: white;
      padding: 11px 20px;
      border-radius: 10px;
      font-size: 13.5px;
      z-index: 9999;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.25s;
      pointer-events: none;
      max-width: 300px;
    }

    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.ok { border-left: 4px solid var(--green); }
    #toast.err { border-left: 4px solid var(--red); }

    /* ===================== DIRECC SECTION ===================== */
    .dir-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

    /* ===================== EMPTY STATE ===================== */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--gray-400);
    }

    .empty-state .es-icon { font-size: 36px; margin-bottom: 10px; }
    .empty-state p { font-size: 14px; }

    /* ===================== RESPONSIVE ===================== */
    @media (max-width: 860px) {
      .g3 { grid-template-columns: 1fr 1fr; }
      .g4 { grid-template-columns: 1fr 1fr; }
      .dir-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 600px) {
      :root { --sidebar-w: 56px; }
      .sidebar-logo, .sidebar-role, .sidebar-area,
      .nav-item > span:not(.nav-icon),
      .nav-section, .logout-btn span { display: none; }
      .nav-item { justify-content: center; padding: 12px; }
      .content { padding: 16px; }
      .g2, .g3, .g4 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ======================== LOGIN ======================== -->
<div id="login-screen">
  <div class="login-wrap">
    <div class="login-badge">Universidad San Sebastian</div>
    <div class="login-title">Planificador<br>CEUSS</div>
    <div class="login-sub">Plan Estrategico 2026 &ndash; 2028</div>
    <div class="login-box">
      <label>Codigo de acceso</label>
      <input type="password" id="login-input" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" autocomplete="off">
      <button class="login-btn" onclick="doLogin()">Ingresar</button>
      <div class="login-error" id="login-err">Codigo incorrecto. Intenta nuevamente.</div>
    </div>
  </div>
</div>

<!-- ======================== APP ======================== -->
<div id="app">
  <nav class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">CEUSS</div>
      <div class="sidebar-role" id="sb-role"></div>
      <div class="sidebar-area" id="sb-area"></div>
    </div>
    <div class="sidebar-nav" id="sb-nav"></div>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="doLogout()">&#8629; <span>Cerrar sesion</span></button>
    </div>
  </nav>

  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbar-title">Planificador CEUSS</div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- ======================== MODAL ======================== -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal-body"></div>
</div>

<!-- ======================== TOAST ======================== -->
<div id="toast"></div>

function getDefaultData() {
  return {
    events: [],
    tasks: [],
    kpis: JSON.parse(JSON.stringify(DEFAULT_KPIS)),
    risks: [],
    decisions: []
  };
}

function getCodes() {
  try {
    const s = localStorage.getItem('ceuss_codes');
    if (s) return JSON.parse(s);
  } catch(e) {}
  return { ceuss:'ceuss2026', cultural:'cultural2026', diseno:'diseno2026', ediciones:'ediciones2026' };
}

function saveCodes(c) { localStorage.setItem('ceuss_codes', JSON.stringify(c)); }

/* ============================================================
   STATE
============================================================ */
let CU = null;   // current user
let DATA = getDefaultData();
let SEC = 'calendario';
let CAL_DATE = new Date();
let ACTIVE_TAB = '';
let SCRIPT_URL = '';

/* ============================================================
   LOGIN / LOGOUT
============================================================ */
document.getElementById('login-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function doLogin() {
  const code = document.getElementById('login-input').value.trim();
  const codes = getCodes();
  const errEl = document.getElementById('login-err');
  errEl.style.display = 'none';

  let user = null;
  if (code === codes.ceuss) {
    user = { id:'ceuss', name:'Mini', areaName:'CEUSS', isDir:true };
  } else if (code === codes.cultural) {
    user = { id:'cultural', name:'Daniela Correa', areaName:'Extension Cultural', isDir:false };
  } else if (code === codes.diseno) {
    user = { id:'diseno', name:'Elisa', areaName:'Diseno', isDir:false };
  } else if (code === codes.ediciones) {
    user = { id:'ediciones', name:'Constanza', areaName:'Ediciones', isDir:false };
  }

  if (!user) { errEl.style.display = 'block'; return; }

  CU = user;
  ACTIVE_TAB = CU.id;
  SCRIPT_URL = localStorage.getItem('ceuss_script_url') || '';

  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  initApp();
}

function doLogout() {
  CU = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-input').value = '';
}

/* ============================================================
   INIT
============================================================ */
function initApp() {
  document.getElementById('sb-role').textContent = CU.isDir ? 'Directora' : CU.name;
  document.getElementById('sb-area').textContent = CU.areaName;
  buildSidebar();
  loadData();
}

/* ============================================================
   SIDEBAR
============================================================ */
function buildSidebar() {
  const items = [
    { id:'calendario', icon:'&#128197;', label:'Calendario' },
    { id:'tareas',     icon:'&#9989;',   label:'Tareas' },
    { id:'kpis',       icon:'&#128202;', label:'KPIs' },
    { id:'riesgos',    icon:'&#9888;',   label:'Riesgos' },
    { id:'decisiones', icon:'&#128221;', label:'Decisiones' },
  ];

  const dirItems = [
    { id:'direccion', icon:'&#127963;', label:'Vista Direccion' },
    { id:'equipo',    icon:'&#128101;', label:'Equipo' },
  ];

  const sysItems = [
    { id:'configuracion', icon:'&#9881;', label:'Configuracion' },
  ];

  let html = '<div class="nav-section">Principal</div>';
  items.forEach(it => { html += navBtn(it); });

    html += '<div class="nav-section">Direccion</div>';
    dirItems.forEach(it => { html += navBtn(it); });

function navBtn({ id, icon, label }) {
  return `<div class="nav-item" id="nav-${id}" onclick="goTo('${id}')">
    <span class="nav-icon">${icon}</span>
    <span>${label}</span>
  </div>`;
}

function goTo(id) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('nav-' + id);
  if (el) el.classList.add('active');
  SEC = id;

  const titles = {
    calendario:'Calendario de Planificacion',
    tareas:'Gestion de Tareas',
    kpis:'KPIs Estrategicos 2026-2028',
    riesgos:'Registro de Riesgos',
    decisiones:'Registro de Decisiones',
    direccion:'Vista Direccion',
    equipo:'Carga del Equipo',
    configuracion:'Configuracion'
  };

  document.getElementById('topbar-title').textContent = titles[id] || 'CEUSS';
  renderSec(id);
}

/* ============================================================
   DATA
============================================================ */
async function loadData() {
  const cached = localStorage.getItem('ceuss_data');
  if (cached) {
    try {
      const parsed = JSON.parse(cached);
      DATA = mergeData(parsed);
    } catch(e) {}
  }

  if (SCRIPT_URL) {
    try {
      const res = await fetch(SCRIPT_URL + '?action=getData');
      const json = await res.json();
      if (json && json.data) {
        DATA = mergeData(json.data);
        localStorage.setItem('ceuss_data', JSON.stringify(DATA));
      }
    } catch(e) { /* Use local */ }
  }

  renderSec(SEC);
}

function mergeData(incoming) {
  // Name-based area deduplication guard
  const base = getDefaultData();
  return {
    events:    Array.isArray(incoming.events)    ? incoming.events    : base.events,
    tasks:     Array.isArray(incoming.tasks)     ? incoming.tasks     : base.tasks,
    kpis:      Array.isArray(incoming.kpis)      ? incoming.kpis      : base.kpis,
    risks:     Array.isArray(incoming.risks)     ? incoming.risks     : base.risks,
    decisions: Array.isArray(incoming.decisions) ? incoming.decisions : base.decisions,
  };
}

function persist() {
  localStorage.setItem('ceuss_data', JSON.stringify(DATA));
  if (SCRIPT_URL) {
    fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'saveAll', payload: DATA }),
      headers: { 'Content-Type': 'application/json' }
    }).catch(() => {});
  }
}

/* ============================================================
   SECTION ROUTER
============================================================ */
function renderSec(id) {
  const c = document.getElementById('content');
  switch(id) {
    case 'calendario':    c.innerHTML = secCalendario(); break;
    case 'tareas':        c.innerHTML = secTareas(); break;
    case 'kpis':          c.innerHTML = secKPIs(); break;
    case 'riesgos':       c.innerHTML = secRiesgos(); break;
    case 'decisiones':    c.innerHTML = secDecisiones(); break;
    case 'direccion':     c.innerHTML = secDireccion(); break;
    case 'equipo':        c.innerHTML = secEquipo(); break;
    case 'configuracion': c.innerHTML = secConfiguracion(); break;
    default: c.innerHTML = '';
  }
}

/* ============================================================
   AREA TABS HELPER
============================================================ */
function visibleAreas() {
  return CU.isDir ? AREAS : AREAS.filter(a => a.id === CU.id);
}

function areaTabs(fn) {
  const areas = visibleAreas();
  if (areas.length <= 1) return '';
  return '<div class="area-tabs">' +
    areas.map(a =>
      `<button class="atab ${a.id === ACTIVE_TAB ? 'active' : ''}" onclick="${fn}('${a.id}')">${a.name}</button>`
    ).join('') +
    '</div>';
}

/* ============================================================
   CALENDARIO
============================================================ */
function secCalendario() {
  const y = CAL_DATE.getFullYear();
  const m = CAL_DATE.getMonth();
  const today = new Date();
  const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const DAYS = ['Lun','Mar','Mie','Jue','Vie','Sab','Dom'];

  const areaEvents = DATA.events.filter(e => e.areaId === ACTIVE_TAB);
  const mEvents = areaEvents.filter(e => {
    const d = new Date(e.fecha + 'T12:00:00');
    return d.getFullYear() === y && d.getMonth() === m;
  });

  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const offset = firstDay === 0 ? 6 : firstDay - 1;

  let cells = DAYS.map(d => `<div class="cal-hdr">${d}</div>`).join('');

  for (let i = 0; i < offset; i++) cells += '<div class="cal-cell empty"></div>';

  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = today.getFullYear() === y && today.getMonth() === m && today.getDate() === d;
    const dayEvts = mEvents.filter(e => new Date(e.fecha + 'T12:00:00').getDate() === d);
    const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

    let evtHtml = dayEvts.slice(0,3).map(e =>
      `<div class="cal-evt cal-evt-${e.areaId}" title="${esc(e.titulo)}">${esc(e.titulo)}</div>`
    ).join('');
    if (dayEvts.length > 3) evtHtml += `<div style="font-size:9px;color:var(--gray-400)">+${dayEvts.length-3} mas</div>`;

    cells += `<div class="cal-cell${isToday ? ' today' : ''}" onclick="openEvtModal('${dateStr}')">
      <div class="cal-num">${d}</div>${evtHtml}
    </div>`;
  }

  return `
    ${areaTabs('setCalTab')}
    <div class="card">
      <div class="cal-nav">
        <button class="btn btn-outline btn-sm" onclick="calMove(-1)">&#9664; Anterior</button>
        <div class="cal-month-label">${MONTHS[m]} ${y}</div>
        <button class="btn btn-outline btn-sm" onclick="calMove(1)">Siguiente &#9654;</button>
      </div>
      <div class="cal-grid">${cells}</div>
    </div>
    <div style="font-size:12px;color:var(--gray-400);margin-top:-12px">Haz clic en un dia para agregar un evento.</div>
    ${secEventList(mEvents, m, y)}
  `;
}

function secEventList(events, m, y) {
  if (!events.length) return '';
  const sorted = [...events].sort((a,b) => new Date(a.fecha) - new Date(b.fecha));
  const rows = sorted.map(e => `<tr>
    <td>${fmtDate(e.fecha)}</td>
    <td><strong>${esc(e.titulo)}</strong>${e.descripcion ? '<br><span style="font-size:12px;color:var(--gray-400)">'+esc(e.descripcion.substring(0,60))+'</span>' : ''}</td>
    <td>${esc(e.responsable || '&#8212;')}</td>
    <td>
      <button class="btn btn-outline btn-sm" onclick="delEvt('${e.id}')" style="color:var(--red)">&#128465;</button>
    </td>
  </tr>`).join('');

  return `<div class="card" style="margin-top:0">
    <div class="card-title">&#128197; Eventos de este mes</div>
    <table>
      <thead><tr><th>Fecha</th><th>Evento</th><th>Responsable</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function setCalTab(id) { ACTIVE_TAB = id; renderSec('calendario'); }
function calMove(dir) { CAL_DATE.setMonth(CAL_DATE.getMonth() + dir); renderSec('calendario'); }

function openEvtModal(dateStr) {
  if (!CU.isDir && ACTIVE_TAB !== CU.id) return;
  const areaOpts = visibleAreas().map(a =>
    `<option value="${a.id}" ${a.id === ACTIVE_TAB ? 'selected' : ''}>${a.name}</option>`
  ).join('');
  const teamOpts = ['', ...TEAM].map(m =>
    `<option value="${m}">${m || '-- Sin asignar --'}</option>`
  ).join('');

  openModal(`
    <div class="modal-title">&#128197; Nuevo Evento</div>
    <div class="fg"><label>Titulo del evento</label>
      <input type="text" id="ev-tit" placeholder="Nombre del evento...">
    </div>
    <div class="fg"><label>Fecha</label>
      <input type="date" id="ev-fecha" value="${dateStr}">
    </div>
    <div class="g2">
      <div class="fg"><label>Area</label><select id="ev-area">${areaOpts}</select></div>
      <div class="fg"><label>Responsable</label><select id="ev-resp">${teamOpts}</select></div>
    </div>
    <div class="fg"><label>Descripcion (opcional)</label>
      <textarea id="ev-desc" placeholder="Detalles del evento..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveEvt()">Guardar evento</button>
    </div>
  `);
}

function saveEvt() {
  const tit  = document.getElementById('ev-tit').value.trim();
  const fecha = document.getElementById('ev-fecha').value;
  const areaId = document.getElementById('ev-area').value;
  const resp = document.getElementById('ev-resp').value;
  const desc = document.getElementById('ev-desc').value.trim();

  if (!tit || !fecha) { toast('Completa titulo y fecha', 'err'); return; }

  const ev = { id:'ev_'+Date.now(), titulo:tit, fecha, areaId, responsable:resp, descripcion:desc, creadoPor:CU.name };
  DATA.events.push(ev);

  if (resp) {
    DATA.tasks.push({
      id:'task_'+Date.now(), titulo:'[Evento] '+tit, areaId, responsable:resp,
      fechaVenc:fecha, estado:'Pendiente', prioridad:'Media',
      descripcion:'Tarea generada desde evento: '+tit
    });
  }

  persist();
  closeModal();
  toast('Evento guardado', 'ok');
  renderSec('calendario');
}

function delEvt(id) {
  if (!confirm('Eliminar este evento?')) return;
  DATA.events = DATA.events.filter(e => e.id !== id);
  persist();
  toast('Evento eliminado', 'ok');
  renderSec('calendario');
}

/* ============================================================
   TAREAS
============================================================ */
function secTareas() {
  const tabs = areaTabs('setTareasTab');

  const tasks = DATA.tasks.filter(t =>
    CU.isDir ? t.areaId === ACTIVE_TAB : t.areaId === CU.id
  );

  const stats = {
    total: tasks.length,
    pend: tasks.filter(t => t.estado === 'Pendiente').length,
    prog: tasks.filter(t => t.estado === 'En progreso').length,
    done: tasks.filter(t => t.estado === 'Completada').length,
  };

  let rows = '';
  if (!tasks.length) {
    rows = `<tr><td colspan="7"><div class="empty-state"><div class="es-icon">&#9989;</div><p>Sin tareas registradas.<br>Haz clic en "+ Nueva tarea" para comenzar.</p></div></td></tr>`;
  } else {
    [...tasks].sort((a,b)=> {
      const ord = { 'Pendiente':0, 'En progreso':1, 'Completada':2, 'Cancelada':3 };
      return (ord[a.estado]||0) - (ord[b.estado]||0);
    }).forEach(t => {
      const eBadge = { 'Pendiente':'badge-amber', 'En progreso':'badge-blue', 'Completada':'badge-green', 'Cancelada':'badge-gray' }[t.estado] || 'badge-gray';
      const pBadge = { 'Alta':'badge-red', 'Media':'badge-amber', 'Baja':'badge-green' }[t.prioridad] || 'badge-gray';
      const area = AREAS.find(a => a.id === t.areaId);
      rows += `<tr>
        <td>
          <strong>${esc(t.titulo)}</strong>
          ${t.descripcion ? `<br><span style="font-size:11.5px;color:var(--gray-400)">${esc(t.descripcion.substring(0,55))}${t.descripcion.length>55?'...':''}</span>` : ''}
        </td>
        <td>${area ? area.name : t.areaId}</td>
        <td>${esc(t.responsable||'&#8212;')}</td>
        <td>${fmtDate(t.fechaVenc)}</td>
        <td><span class="badge ${eBadge}">${t.estado}</span></td>
        <td><span class="badge ${pBadge}">${t.prioridad||'Media'}</span></td>
        <td style="white-space:nowrap">
          <button class="btn btn-outline btn-sm" onclick="openTareaModal('${t.id}')" title="Editar">&#9998;</button>
          <button class="btn btn-outline btn-sm" onclick="delTarea('${t.id}')" style="color:var(--red)" title="Eliminar">&#128465;</button>
        </td>
      </tr>`;
    });
  }

  return `
    ${tabs}
    <div class="g4" style="margin-bottom:20px">
      <div class="stat"><div class="stat-label">Total</div><div class="stat-value">${stats.total}</div></div>
      <div class="stat"><div class="stat-label">Pendientes</div><div class="stat-value" style="color:var(--amber)">${stats.pend}</div></div>
      <div class="stat"><div class="stat-label">En progreso</div><div class="stat-value" style="color:var(--blue)">${stats.prog}</div></div>
      <div class="stat"><div class="stat-label">Completadas</div><div class="stat-value" style="color:var(--green)">${stats.done}</div></div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:flex-end;margin-bottom:16px">
        <button class="btn btn-primary" onclick="openTareaModal()">+ Nueva tarea</button>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr>
            <th>Tarea</th><th>Area</th><th>Responsable</th><th>Vencimiento</th><th>Estado</th><th>Prioridad</th><th></th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;
}

function setTareasTab(id) { ACTIVE_TAB = id; renderSec('tareas'); }

function openTareaModal(tid) {
  const t = tid ? DATA.tasks.find(x => x.id === tid) : null;
  const areaOpts = visibleAreas().map(a =>
    `<option value="${a.id}" ${(t ? t.areaId === a.id : a.id === ACTIVE_TAB) ? 'selected' : ''}>${a.name}</option>`
  ).join('');
  const teamOpts = ['', ...TEAM].map(m =>
    `<option value="${m}" ${t && t.responsable === m ? 'selected' : ''}>${m || '-- Sin asignar --'}</option>`
  ).join('');
  const estOpts = ['Pendiente','En progreso','Completada','Cancelada'].map(e =>
    `<option ${(t ? t.estado === e : e === 'Pendiente') ? 'selected' : ''}>${e}</option>`
  ).join('');
  const priorOpts = ['Alta','Media','Baja'].map(p =>
    `<option ${(t ? t.prioridad === p : p === 'Media') ? 'selected' : ''}>${p}</option>`
  ).join('');

  openModal(`
    <div class="modal-title">${t ? '&#9998; Editar Tarea' : '&#9989; Nueva Tarea'}</div>
    <div class="fg"><label>Titulo</label>
      <input type="text" id="t-tit" value="${t ? esc(t.titulo) : ''}">
    </div>
    <div class="fg"><label>Descripcion</label>
      <textarea id="t-desc">${t ? esc(t.descripcion||'') : ''}</textarea>
    </div>
    <div class="g2">
      <div class="fg"><label>Area</label><select id="t-area">${areaOpts}</select></div>
      <div class="fg"><label>Responsable</label><select id="t-resp">${teamOpts}</select></div>
    </div>
    <div class="g2">
      <div class="fg"><label>Fecha de vencimiento</label>
        <input type="date" id="t-fecha" value="${t ? t.fechaVenc||'' : ''}">
      </div>
      <div class="fg"><label>Estado</label><select id="t-est">${estOpts}</select></div>
    </div>
    <div class="fg"><label>Prioridad</label><select id="t-prior">${priorOpts}</select></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveTarea('${tid||''}')">${t ? 'Actualizar' : 'Guardar'}</button>
    </div>
  `);
}

function saveTarea(tid) {
  const tit = document.getElementById('t-tit').value.trim();
  if (!tit) { toast('El titulo es requerido', 'err'); return; }

  const obj = {
    titulo: tit,
    descripcion: document.getElementById('t-desc').value.trim(),
    areaId: document.getElementById('t-area').value,
    responsable: document.getElementById('t-resp').value,
    fechaVenc: document.getElementById('t-fecha').value,
    estado: document.getElementById('t-est').value,
    prioridad: document.getElementById('t-prior').value
  };

  if (tid) {
    const idx = DATA.tasks.findIndex(t => t.id === tid);
    if (idx >= 0) DATA.tasks[idx] = { ...DATA.tasks[idx], ...obj };
    toast('Tarea actualizada', 'ok');
  } else {
    DATA.tasks.push({ id:'task_'+Date.now(), ...obj });
    toast('Tarea creada', 'ok');
  }

  persist();
  closeModal();
  renderSec('tareas');
}

function delTarea(id) {
  if (!confirm('Eliminar esta tarea?')) return;
  DATA.tasks = DATA.tasks.filter(t => t.id !== id);
  persist();
  toast('Tarea eliminada', 'ok');
  renderSec('tareas');
}

/* ============================================================
   KPIs
============================================================ */
function secKPIs() {
  const kpis = CU.isDir ? DATA.kpis
    : DATA.kpis.filter(k => k.area === CU.id || k.area === 'ceuss');

  if (!kpis.length) return '<div class="card"><p style="color:var(--gray-400)">Sin KPIs configurados.</p></div>';

  const cards = kpis.map(k => {
    const pct = Math.min(100, k.meta > 0 ? Math.round((k.actual / k.meta) * 100) : 0);
    const fillCls = pct >= 100 ? 'green' : pct >= 60 ? '' : 'red';
    const pctColor = pct >= 60 ? 'var(--green)' : 'var(--red)';
    const area = AREAS.find(a => a.id === k.area);

    return `<div class="kpi-card">
      <div class="kpi-label">${esc(k.nombre)}</div>
      <div class="kpi-sub">${area ? area.name : ''} &middot; ${k.frecuencia}</div>
      <div class="kpi-nums">
        <div class="kpi-val">${k.actual}</div>
        <div class="kpi-meta">/ ${k.meta} ${k.unidad}</div>
      </div>
      <div class="pbar" style="margin-bottom:10px">
        <div class="pbar-fill ${fillCls}" style="width:${pct}%"></div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:13px;font-weight:700;color:${pctColor}">${pct}% alcanzado</span>
        <button class="btn btn-outline btn-sm" onclick="openKPIModal('${k.id}')">Actualizar</button>
      </div>
    </div>`;
  }).join('');

  return `<div class="g2">${cards}</div>`;
}

function openKPIModal(id) {
  const k = DATA.kpis.find(x => x.id === id);
  if (!k) return;
  openModal(`
    <div class="modal-title">&#128202; Actualizar KPI</div>
    <div class="fg">
      <label>Nombre del KPI</label>
      <input type="text" id="kpi-nom" value="${esc(k.nombre)}">
    </div>
    <div class="g2">
      <div class="fg"><label>Valor actual</label>
        <input type="number" id="kpi-act" value="${k.actual}" min="0">
      </div>
      <div class="fg"><label>Meta</label>
        <input type="number" id="kpi-meta" value="${k.meta}" min="0">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveKPI('${id}')">Guardar</button>
    </div>
  `);
}

function saveKPI(id) {
  const idx = DATA.kpis.findIndex(k => k.id === id);
  if (idx < 0) return;
  const nom = document.getElementById('kpi-nom').value.trim();
  if (nom) DATA.kpis[idx].nombre = nom;
  DATA.kpis[idx].actual = parseFloat(document.getElementById('kpi-act').value) || 0;
  DATA.kpis[idx].meta = parseFloat(document.getElementById('kpi-meta').value) || 0;
  persist();
  closeModal();
  toast('KPI actualizado', 'ok');
  renderSec('kpis');
}

/* ============================================================
   RIESGOS
============================================================ */
function secRiesgos() {
  const tabs = areaTabs('setRiesgosTab');

  let rows = '';

    rows = `<tr><td colspan="6"><div class="empty-state"><div class="es-icon">&#9888;</div><p>Sin riesgos registrados.</p></div></td></tr>`;
  } else {
    risks.forEach(r => {
      const iBadge = { Alto:'badge-red', Medio:'badge-amber', Bajo:'badge-green' }[r.impacto]||'badge-gray';
      const pBadge = { Alta:'badge-red', Media:'badge-amber', Baja:'badge-green' }[r.probabilidad]||'badge-gray';
      rows += `<tr>
        <td><strong>${esc(r.titulo)}</strong></td>

        <td><button class="btn btn-outline btn-sm" onclick="delRiesgo('${r.id}')" style="color:var(--red)">&#128465;</button></td>

    });
  }

  return `
    ${tabs}
    <div class="card">
      <div style="display:flex;justify-content:flex-end;margin-bottom:16px">

          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;
}

function setRiesgosTab(id) { ACTIVE_TAB = id; renderSec('riesgos'); }

function openRiesgoModal() {

/* ============================================================
   VISTA DIRECCION (solo directora)
============================================================ */
function secDireccion() {
  if (!CU.isDir) return '<div class="card"><p style="color:var(--gray-400)">Acceso restringido.</p></div>';

  // Stats
  const onTrack = DATA.kpis.filter(k => k.meta > 0 && (k.actual/k.meta) >= 0.6).length;
  const active = DATA.tasks.filter(t => t.estado !== 'Completada' && t.estado !== 'Cancelada').length;
  const highRisks = DATA.risks.filter(r => r.impacto === 'Alto');

  // Avance tareas por area
  let taskBars = AREAS.map(a => {
    const ts = DATA.tasks.filter(t => t.areaId === a.id);
    const done = ts.filter(t => t.estado === 'Completada').length;
    const pct = ts.length ? Math.round((done/ts.length)*100) : 0;
    const fc = pct >= 100 ? 'green' : pct >= 60 ? '' : 'red';
    return `<div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px">
        <span style="font-size:13px;font-weight:500">${a.name}</span>
        <span style="font-size:12px;color:var(--gray-400)">${done}/${ts.length} completadas</span>
      </div>
      <div class="pbar"><div class="pbar-fill ${fc}" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');

  // Proximos eventos (30 dias)
  const now = new Date();
  const in30 = new Date(); in30.setDate(now.getDate()+30);
  const upcoming = DATA.events
    .filter(e => { const d = new Date(e.fecha+'T12:00:00'); return d >= now && d <= in30; })
    .sort((a,b) => new Date(a.fecha) - new Date(b.fecha))
    .slice(0,8);

  let evtList = upcoming.length === 0
    ? '<p style="color:var(--gray-400);font-size:13px">Sin eventos en los proximos 30 dias.</p>'
    : upcoming.map(e => {
        const d = new Date(e.fecha+'T12:00:00');
        const area = AREAS.find(a => a.id === e.areaId);
        return `<div style="display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--gray-100)">
          <div style="min-width:46px;text-align:center;background:var(--gray-100);border-radius:8px;padding:4px 6px;flex-shrink:0">
            <div style="font-size:9.5px;color:var(--gray-400);font-weight:700">${d.toLocaleString('es',{month:'short'}).toUpperCase()}</div>
            <div style="font-size:20px;font-weight:700;color:var(--navy);line-height:1.1">${d.getDate()}</div>
          </div>
          <div>
            <div style="font-size:13.5px;font-weight:500">${esc(e.titulo)}</div>
            <div style="font-size:12px;color:var(--gray-400)">${area ? area.name : ''} ${e.responsable ? '&middot; '+esc(e.responsable) : ''}</div>
          </div>
        </div>`;
      }).join('');

  // Carga equipo
  let workRows = TEAM.map(m => {
    const cnt = DATA.tasks.filter(t => t.responsable === m && t.estado !== 'Completada').length;
    const pct = Math.min(100, cnt * 10);
    const fc = cnt > 7 ? 'red' : cnt > 4 ? '' : 'green';
    return `<div class="wrow">
      <div class="wrow-name">${m}</div>
      <div class="wrow-bar">
        <div class="pbar"><div class="pbar-fill ${fc}" style="width:${pct}%"></div></div>
      </div>
      <div class="wrow-count">${cnt} tareas</div>
    </div>`;
  }).join('');

  // Riesgos alto impacto
  let riskList = highRisks.length === 0
    ? '<p style="color:var(--green);font-size:13.5px">&#10003; Sin riesgos de alto impacto registrados</p>'
    : highRisks.map(r => {
        const area = AREAS.find(a => a.id === r.areaId);
        return `<div style="padding:9px 0;border-bottom:1px solid var(--gray-100)">
          <span class="badge badge-red" style="margin-right:8px">Alto impacto</span>
          <strong style="font-size:13px">${esc(r.titulo)}</strong>
          <span style="font-size:12px;color:var(--gray-400);margin-left:6px">${area ? area.name : ''}</span>
          ${r.mitigacion ? `<div style="font-size:11.5px;color:var(--gray-400);margin-top:3px">Mitigacion: ${esc(r.mitigacion.substring(0,80))}</div>` : ''}
        </div>`;
      }).join('');

  // KPI resumen
  let kpiRows = DATA.kpis.map(k => {
    const pct = Math.min(100, k.meta > 0 ? Math.round((k.actual/k.meta)*100) : 0);
    const fc = pct >= 100 ? 'green' : pct >= 60 ? '' : 'red';
    return `<div style="padding:10px 0;border-bottom:1px solid var(--gray-100)">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px">
        <span style="font-size:12.5px;font-weight:500">${esc(k.nombre)}</span>
        <span style="font-size:13px;font-weight:700;color:${pct>=60?'var(--green)':'var(--red)'}">${pct}%</span>
      </div>
      <div class="pbar"><div class="pbar-fill ${fc}" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');

  return `
    <!-- Stats rapidos -->
    <div class="g4" style="margin-bottom:20px">
      <div class="stat"><div class="stat-label">KPIs en marcha</div><div class="stat-value" style="color:var(--green)">${onTrack}/${DATA.kpis.length}</div></div>
      <div class="stat"><div class="stat-label">Tareas activas</div><div class="stat-value">${active}</div></div>
      <div class="stat"><div class="stat-label">Riesgos registrados</div><div class="stat-value" style="color:${highRisks.length>0?'var(--red)':'var(--green)'}">${DATA.risks.length}</div></div>
      <div class="stat"><div class="stat-label">Decisiones</div><div class="stat-value">${DATA.decisions.length}</div></div>
    </div>

    <div class="dir-grid">
      <div class="card">
        <div class="card-title">&#9989; Avance de tareas por area</div>
        ${taskBars || '<p style="color:var(--gray-400);font-size:13px">Sin tareas registradas.</p>'}
      </div>
      <div class="card">
        <div class="card-title">&#128101; Carga del equipo</div>
        ${workRows}
      </div>
    </div>

    <div class="dir-grid">
      <div class="card">
        <div class="card-title">&#128197; Proximos eventos (30 dias)</div>
        ${evtList}
      </div>
      <div class="card">
        <div class="card-title">&#9888; Riesgos de alto impacto</div>
        ${riskList}
      </div>
    </div>

    <div class="card">
      <div class="card-title">&#128202; Estado de KPIs Estrategicos</div>
      <div class="g2">${kpiRows}</div>
    </div>
  `;
}

/* ============================================================
   EQUIPO (solo directora)
============================================================ */
function secEquipo() {
  if (!CU.isDir) return '<div class="card"><p style="color:var(--gray-400)">Acceso restringido.</p></div>';

  let workCards = TEAM.map(m => {
    const all = DATA.tasks.filter(t => t.responsable === m);
    const pend = all.filter(t => t.estado==='Pendiente').length;
    const prog = all.filter(t => t.estado==='En progreso').length;
    const done = all.filter(t => t.estado==='Completada').length;
    const pct = all.length ? Math.round((done/all.length)*100) : 0;
    const fc = pct >= 100 ? 'green' : (pend+prog) > 7 ? 'red' : '';

    return `<div class="wrow">
      <div class="wrow-name">${m}</div>
      <div class="wrow-bar">
        <div class="pbar"><div class="pbar-fill ${fc}" style="width:${pct}%"></div></div>
        <div style="font-size:11px;color:var(--gray-400);margin-top:3px">${pend} pendientes &middot; ${prog} en progreso &middot; ${done} completadas</div>
      </div>
      <div class="wrow-count">${all.length}</div>
    </div>`;
  }).join('');

  const active = DATA.tasks.filter(t => t.estado !== 'Completada' && t.estado !== 'Cancelada');
  let rows = active.length === 0
    ? `<tr><td colspan="5"><div class="empty-state"><div class="es-icon">&#127881;</div><p>Todo al dia! Sin tareas activas.</p></div></td></tr>`
    : active.sort((a,b) => {
        const ord = { Alta:0, Media:1, Baja:2 };
        return (ord[a.prioridad]||1) - (ord[b.prioridad]||1);
      }).map(t => {
        const area = AREAS.find(a => a.id === t.areaId);
        const eBadge = { 'Pendiente':'badge-amber', 'En progreso':'badge-blue' }[t.estado]||'badge-gray';
        return `<tr>
          <td>${esc(t.titulo)}</td>
          <td>${area ? area.name : t.areaId}</td>
          <td>${esc(t.responsable||'&#8212;')}</td>
          <td>${fmtDate(t.fechaVenc)}</td>
          <td><span class="badge ${eBadge}">${t.estado}</span></td>
        </tr>`;
      }).join('');

  return `
    <div class="card">
      <div class="card-title">&#128101; Carga de trabajo por persona</div>
      ${workCards}
    </div>
    <div class="card">
      <div class="card-title">&#128203; Tareas activas del equipo</div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>Tarea</th><th>Area</th><th>Responsable</th><th>Vencimiento</th><th>Estado</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;
}

}

function guardarURL() {
  const url = document.getElementById('sc-url').value.trim();
  localStorage.setItem('ceuss_script_url', url);
  SCRIPT_URL = url;
  toast('URL guardada. Sincronizando...', 'ok');
  setTimeout(loadData, 800);
}

function restablecerDatos() {
  if (!confirm('Esto borrara el cache local y recargara desde Google Sheets.\n\nSi no tienes Google Sheets configurado, los datos quedaran en blanco.\n\nContinuar?')) return;
  localStorage.removeItem('ceuss_data');
  DATA = getDefaultData();
  toast('Cache limpiado. Recargando...', 'ok');
  setTimeout(loadData, 600);
}

/* ============================================================
   MODAL
============================================================ */
function openModal(html) {
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
}

document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

/* ============================================================
   TOAST
============================================================ */
let _toastTimer;
function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.className = ''; }, 3200);
}

/* ============================================================
   UTILS
============================================================ */
function fmtDate(s) {
  if (!s) return '&mdash;';
  try {
    const d = new Date(s + 'T12:00:00');
    return d.toLocaleDateString('es-CL', { day:'2-digit', month:'short', year:'numeric' });
  } catch(e) { return s; }
}

function esc(s) {
  if (!s && s !== 0) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
